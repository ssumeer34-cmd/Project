       <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITI Skill Bazaar - R.S. Pura</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 12px; }
        .header { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); color: white; padding: 25px 15px; text-align: center; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .header h1 { font-size: 26px; font-weight: 800; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); }
        .jammu-badge { background: linear-gradient(135deg, #00b09b, #96c93d); padding: 8px 20px; border-radius: 25px; font-size: 14px; display: inline-block; margin-top: 10px; font-weight: 700; }
        .box { background: rgba(255,255,255,0.98); padding: 22px; margin: 20px 0; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .box h2 { color: #2d3748; margin-bottom: 18px; font-size: 22px; font-weight: 800; }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border: 3px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-family: 'Poppins'; }
        input:focus, textarea:focus, select:focus { border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.15); transform: translateY(-2px); outline: none; }
        .btn-add { width: 100%; padding: 18px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin: 12px 0; box-shadow: 0 12px 25px rgba(102,126,234,0.4); }
        
        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .trade-item { background: #f8fafc; border: 3px solid #e2e8f0; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .trade-item.active { border-color: #667eea; background: linear-gradient(135deg, #667eea, #764ba2); color: white; transform: scale(1.05); }
        .trade-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .trade-item p { font-size: 13px; font-weight: 700; }
        
        .product { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); padding: 25px; margin: 25px 0; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); position: relative; overflow: hidden; }
        .product::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #667eea, #764ba2, #f093fb); }
        .product-img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .student-card { background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%); color: white; padding: 20px; border-radius: 15px; margin: 12px 0; box-shadow: 0 12px 30px rgba(0,0,0,0.3); border: 2px solid rgba(251,191,36,0.3); }
        .student-name { font-size: 24px; font-weight: 800; color: #fbbf24; margin-bottom: 8px; }
        .trade-badge { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; padding: 6px 15px; border-radius: 20px; font-size: 13px; display: inline-block; font-weight: 700; }
        .contact-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; font-size: 14px; margin: 8px 0; }
        .contact-item b { color: #fbbf24; display: block; font-size: 11px; margin-bottom: 2px; }
        .samaan-name { font-size: 24px; color: #dc2626; font-weight: 800; margin: 15px 0 10px 0; }
        .price { color: #16a34a; font-size: 32px; font-weight: 800; margin: 12px 0; display: inline-block; background: rgba(22,163,74,0.1); padding: 6px 18px; border-radius: 12px; }
        .detail { background: #f8fafc; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 15px; line-height: 1.6; border-left: 4px solid #667eea; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .whatsapp-btn { background: linear-gradient(135deg, #25D366, #128C7E); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(37,211,102,0.4); text-decoration: none; display: block; text-align: center; }
        .call-btn { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(14,165,233,0.4); text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; }
        .delete-btn { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 10px; border: none; border-radius: 10px; font-size: 14px; margin-top: 15px; cursor: pointer; width: 100%; font-weight: 700; }
        .jammu-special { position: absolute; top: 20px; right: 20px; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; box-shadow: 0 6px 15px rgba(245,158,11,0.5); transform: rotate(8deg); }
        .counter-3d { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; padding: 10px 20px; border-radius: 25px; font-size: 18px; font-weight: 800; box-shadow: 0 8px 20px rgba(220,38,38,0.4); display: inline-block; }
        @media (max-width: 600px) {.btn-group { grid-template-columns: 1fr; }.header h1 { font-size: 24px; }.student-name { font-size: 20px; }.price { font-size: 28px; } .trade-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 ITI SKILL BAZAAR 3D</h1>
        <p>R.S. Pura | <span class="jammu-badge">🇮🇳 JAMMU KA HUNAR</span></p>
    </div>

    <div class="box">
        <h2>📝 Apna Samaan Add Karo</h2>
        <input type="text" id="studentNaam" placeholder="★ Tera Naam: Rohit Kumar">
        
        <p style="margin:15px 0 10px 0; font-weight:700; color:#2d3748;">★ Trade Chuno:</p>
        <div class="trade-grid" id="tradeGrid"></div>
        <input type="hidden" id="selectedTrade">
        
        <input type="tel" id="studentMobile" placeholder="★ Mobile: 9876543210" maxlength="10">
        <input type="text" id="studentAddress" placeholder="★ Address: Ward No 5, R.S. Pura">
        <input type="text" id="samaanNaam" placeholder="★ Samaan: LED Lamp">
        <input type="number" id="samaanDaam" placeholder="★ Daam ₹: 450">
        <textarea id="samaanDetail" placeholder="★ Detail: 2 saal warranty" rows="3"></textarea>
        <select id="jammuTag">
            <option value="">Jammu Tag</option>
            <option value="BORDER SPECIAL">🇮🇳 BORDER SPECIAL</option>
            <option value="BASMATI SPECIAL">🌾 BASMATI SPECIAL</option>
            <option value="YATRA SPECIAL">🙏 YATRA SPECIAL</option>
            <option value="DOGRI SPECIAL">🗣️ DOGRI SPECIAL</option>
        </select>
        <button class="btn-add" onclick="addKaro()">🚀 BAZAAR ME LAGAO</button>
    </div>

    <div class="box">
        <h2>🏪 Live Bazaar - <span class="counter-3d" id="totalCount">0</span> Items</h2>
        <div id="bazaarList"></div>
    </div>

    <script>
        const trades = [
            {name: "Electrician", img: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400"},
            {name: "COPA", img: "https://images.unsplash.com/photo-1607344645866-009c320b63e0?w=400"},
            {name: "Welder", img: "https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?w=400"},
            {name: "Cutting Sewing", img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=400"},
            {name: "Plumber", img: "https://images.unsplash.com/photo-1607472586893-edb57bdc0e39?w=400"},
            {name: "Fitter", img: "https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?w=400"}
        ];

        let data = JSON.parse(localStorage.getItem('itiBazaar3D')) || [];

        // Saare trade show karo
        function loadTrades() {
            tradeGrid.innerHTML = trades.map(t => `
                <div class="trade-item" onclick="selectTrade('${t.name}', '${t.img}', this)">
                    <img src="${t.img}" alt="${t.name}">
                    <p>${t.name}</p>
                </div>
            `).join('');
        }

        function selectTrade(name, img, el) {
            document.querySelectorAll('.trade-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            selectedTrade.value = name;
        }

        loadTrades();
        dikhao();

        function addKaro() {
            let naam = studentNaam.value.trim(), trade = selectedTrade.value, mobile = studentMobile.value.trim();
            let address = studentAddress.value.trim(), samaan = samaanNaam.value.trim(), daam = samaanDaam.value;
            let detail = samaanDetail.value.trim(), jammuTag = jammuTag.value;
            if (!naam ||!trade ||!mobile ||!samaan ||!daam) { alert('★ wale sab fields bharna zaruri hai! Trade bhi select karo'); return; }
            if (mobile.length!== 10 || isNaN(mobile)) { alert('Mobile 10 digit ka hona chahiye!'); return; }

            const tradeData = trades.find(t => t.name === trade);
            const autoPhoto = tradeData ? tradeData.img : "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600";

            data.unshift({id:Date.now(), naam, trade, mobile, address:address||'R.S. Pura, Jammu', samaan, daam:parseInt(daam), detail:detail||'Detail nahi di', jammuTag, photo:autoPhoto});
            localStorage.setItem('itiBazaar3D', JSON.stringify(data));

            studentNaam.value = studentMobile.value = studentAddress.value = samaanNaam.value = samaanDaam.value = samaanDetail.value = jammuTag.value = selectedTrade.value = '';
            document.querySelectorAll('.trade-item').forEach(item => item.classList.remove('active'));
            dikhao();
        }

        function dikhao() {
            totalCount.textContent = data.length;
            bazaarList.innerHTML = data.length? data.map(i => `
                <div class="product">
                    ${i.jammuTag? `<div class="jammu-special">${i.jammuTag}</div>` : ''}
                    <img src="${i.photo}" class="product-img" alt="${i.samaan}">
                    <div class="student-card">
                        <div class="student-name">👨‍🎓 ${i.naam}</div>
                        <span class="trade-badge">${i.trade}</span>
                        <div class="contact-item"><b>📱 MOBILE NUMBER</b>${i.mobile}</div>
                        <div class="contact-item"><b>📍 POORA ADDRESS</b>${i.address}</div>
                        <div style="margin-top:10px;font-size:13px;opacity:0.9;"><b>🏫 ITI:</b> Govt ITI R.S. Pura, Jammu</div>
                    </div>
                    <div class="samaan-name">📦 ${i.samaan}</div>
                    <div class="price">₹${i.daam}</div>
                    <div class="detail"><b style="color:#667eea;">📝 FULL DETAIL:</b><br>${i.detail}</div>
                    <div class="btn-group">
                        <button class="whatsapp-btn" onclick="whatsappKaro('${i.mobile}','${i.samaan}','${i.naam}','${i.daam}')">📱 WhatsApp Karo</button>
                        <a href="tel:${i.mobile}" class="call-btn">📞 Call Karo</a>
                    </div>
                    <button class="delete-btn" onclick="deleteKaro(${i.id},'${i.naam}')">🗑️ Ye Samaan Hatao</button>
                </div>`).join('') : '<p style="text-align:center;color:#6b7280;padding:40px;font-size:18px;font-weight:600;">Abhi bazaar khali hai! 😊<br><br>Upar se pehla samaan add kar!</p>';
        }

        function whatsappKaro(m,n,a,d){
            const msg = `Namaste ${a} Ji! 🙏%0A%0AMain ITI Skill Bazaar se bol raha hun.%0A%0A*📦 Product:* ${n}%0A*💰 Daam:* ₹${d}%0A*👨‍🎓 Student:* ${a}%0A*🏫 ITI:* R.S. Pura%0A%0AKya available hai?`;
            window.open(`https://wa.me/91${m}?text=${msg}`,'_blank');
        }

        function deleteKaro(id,n){
            if(confirm(`Pakka ${n} ka samaan hatana hai?`)){
                data=data.filter(i=>i.id!==id);
                localStorage.setItem('itiBazaar3D',JSON.stringify(data));
                dikhao();
            }
        }
    </script>
</body>
</html>
